<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Organizer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
body{background:#f8f9fa}
.container{padding:20px}
.card{margin-bottom:15px}
.copy-btn{float:right;margin-left:8px}
.preview-icon{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:32px;
  height:32px;
  cursor:pointer;
  border:none;
  background:rgba(255,255,255,0.2);
  border-radius:8px;
  transition:all .3s;
  padding:0;
  margin-left:10px;
}
.preview-icon:hover{
  background:rgba(255,255,255,0.4);
  transform:scale(1.1);
}
.preview-icon svg{
  width:18px;
  height:18px;
}

.preview-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:32px;
  height:32px;
  cursor:pointer;
  border:none;
  background:rgba(255,255,255,0.25);
  border-radius:8px;
  transition:all .3s;
  padding:0;
  margin-right:8px;
  color:#fff;
  flex-shrink:0;
}
.preview-btn:hover{
  background:rgba(255,255,255,0.4);
  transform:scale(1.1);
}
.preview-btn svg{
  width:18px;
  height:18px;
}

.feedback{
  position:fixed;
  top:15px;
  right:20px;
  background:#198754;
  color:#fff;
  padding:10px 18px;
  border-radius:30px;
  font-weight:600;
  opacity:0;
  transform:translateY(-20px);
  transition:all .4s;
  z-index:999;
}
.feedback.show{
  opacity:1;
  transform:translateY(0);
}

.modal-overlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(4px);
  z-index:1000;
  animation:fadeIn .3s;
}
.modal-overlay.show{
  display:flex;
  align-items:center;
  justify-content:center;
}

@keyframes fadeIn{
  from{opacity:0}to{opacity:1}
}

@keyframes slideUp{
  from{transform:translateY(30px);opacity:0}
  to{transform:translateY(0);opacity:1}
}

.modal-box{
  background:#ffffff;
  border-radius:16px;
  padding:28px;
  width:90vw;
  max-width:900px;
  height:85vh;
  max-height:85vh;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  animation:slideUp .3s;
  display:flex;
  flex-direction:column;
}
#modalContent{
  flex:1;
  overflow-y:auto;
  padding-right:10px;
}
#modalContent::-webkit-scrollbar{
  width:8px;
}
#modalContent::-webkit-scrollbar-track{
  background:#f0f0f0;
  border-radius:10px;
}
#modalContent::-webkit-scrollbar-thumb{
  background:#ccc;
  border-radius:10px;
}
#modalContent::-webkit-scrollbar-thumb:hover{
  background:#999;
}
.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  border-bottom:2px solid #f0f0f0;
  padding-bottom:15px;
}
.modal-header h5{
  margin:0;
  font-size:20px;
  font-weight:600;
  color:#333;
}
.modal-close{
  background:none;
  border:none;
  font-size:28px;
  cursor:pointer;
  color:#999;
  transition:color .2s;
  padding:0;
  width:32px;
  height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.modal-close:hover{
  color:#333;
}

.link-item{
  display:flex;
  gap:12px;
  align-items:center;
  padding:14px;
  border:1px solid #e8e8e8;
  border-radius:10px;
  margin-bottom:10px;
  background:#f8f9fa;
  transition:all .2s;
}
.link-item:hover{
  background:#f0f2f5;
  border-color:#d0d0d0;
}
.link-item .link-text{
  flex:1;
  word-break:break-all;
  font-size:13px;
  color:#333;
  font-family:monospace;
}
.link-item select{
  padding:8px 12px;
  border:1px solid #ccc;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
  transition:border .2s;
  background:#fff;
  color:#333;
}
.link-item select:focus{
  outline:none;
  border-color:#0066cc;
  box-shadow:0 0 0 3px rgba(0,102,204,0.1);
}
</style>
</head>

<body>

<div class="feedback" id="feedbackBox">✔ Done</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-header">
      <h5 id="modalTitle">Items</h5>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<div class="container">
  <h4>Image Organizer</h4>
  <div id="envatoBox"></div>
  <div id="adobeBox"></div>
  <div id="otherBox"></div>
</div>

<script>

// ===== GLOBAL RESET DETECTOR =====
if(localStorage.getItem("GLOBAL_RESET")==="1"){
    localStorage.removeItem("imageList");
    localStorage.removeItem("envatoCodes");
    localStorage.removeItem("categoryOverrides");
    localStorage.setItem("GLOBAL_RESET","0");
}

// FEEDBACK ANIMATION
function showFeedback(text){
  const box=$("#feedbackBox");
  box.text("✔ "+text).addClass("show");
  setTimeout(()=>box.removeClass("show"),2000);
}

// MODAL FUNCTIONS
let currentModalItems = [];

function openModal(category, items){
  currentModalItems = items;  // Store items globally for access in moveItem
  $("#modalTitle").text(category);
  const html=items.map((item, idx)=>`
    <div class="link-item" data-item-index="${idx}">
      <span class="link-text">${escapeHtml(item)}</span>
      <select class="link-select" data-item-index="${idx}" onchange="moveItem(this)">
        <option value="">Move to...</option>
        <option value="envato">Envato</option>
        <option value="adobe">Shutterstock</option>
        <option value="other">Other</option>
      </select>
    </div>
  `).join("");
  $("#modalContent").html(html);
  $("#modalOverlay").addClass("show");
}

function escapeHtml(text){
  const map={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
  return text.replace(/[&<>"']/g,m=>map[m]);
}

function closeModal(){
  $("#modalOverlay").removeClass("show");
}

// MOVE ITEM BETWEEN CATEGORIES
function moveItem(selectElement){
  const toCategory = selectElement.value;
  if(!toCategory)return;
  
  const itemIndex = parseInt($(selectElement).data("item-index"));
  const item = currentModalItems[itemIndex];
  
  if(!item)return;
  
  // Store category overrides to preserve user's manual moves
  let overrides = JSON.parse(localStorage.getItem("categoryOverrides")||"[]");
  
  // Remove any existing override for this item
  overrides = overrides.filter(o => o.item !== item);
  
  // Add new override
  overrides.push({item: item, category: toCategory});
  localStorage.setItem("categoryOverrides", JSON.stringify(overrides));
  
  showFeedback("Moved to "+toCategory);
  
  // Update modal immediately without closing
  renderOrganizer();
}

// HELPERS
function getFile(url){return url.split('/').pop().split('?')[0];}

function isAdobe(file){
  const name=file.replace(/\.(jpg|jpeg|png|webp)$/i,'');
  if(/^\d+$/.test(name))return true;
  if(/^(img|ftr|btm|bnr)[-_]\d+$/i.test(name))return true;
  return false;
}

function isEnvato(file){
  let name=file.replace(/\.(jpg|jpeg|png|webp)$/i,'')
               .replace(/^[a-zA-Z]+[-_]/,'')
               .replace(/[-_.]/g,'');
  return /[A-Z]/.test(name) && /[0-9]/.test(name) && !/[a-z]/.test(name);
}

function copyText(arr){
  navigator.clipboard.writeText(arr.join("\n"));
  showFeedback("Copied");
}

function doneCheck(){
  showFeedback("Envato Saved");
}

// RENDER
function renderOrganizer(){
  const data=JSON.parse(localStorage.getItem("imageList")||"[]");
  const overrides=JSON.parse(localStorage.getItem("categoryOverrides")||"[]");

  let envato=[], adobe=[], other=[];

  data.forEach(item=>{
    // Check if there's a manual override for this item
    const override=overrides.find(o=>o.item===item);
    if(override){
      if(override.category==="envato") envato.push(item);
      else if(override.category==="adobe") adobe.push(item);
      else if(override.category==="other") other.push(item);
    }else{
      // Use automatic categorization if no override
      const file=getFile(item);
      if(isAdobe(file)) adobe.push(item);
      else if(isEnvato(file)) envato.push(item);
      else other.push(item);
    }
  });

  localStorage.setItem("envatoCodes",JSON.stringify(envato));

  // Envato section
  $("#envatoBox").html(envato.length?`
  <div class="card">
    <div class="card-header bg-success text-white" style="display:flex;justify-content:space-between;align-items:center">
      <span>🟢 Envato (${envato.length})</span>
      <div>
        <button class="preview-btn" data-category="Envato" data-items='${JSON.stringify(envato).replace(/'/g, "&apos;")}' title="View items">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
          </svg>
        </button>
        <button class="btn btn-light btn-sm copy-btn" onclick="doneCheck()">Done Check</button>
      </div>
    </div>
    <div class="card-body">${envato.map(x=>`<div>${x}</div>`).join("")}</div>
  </div>`:"");

  // Adobe section
  $("#adobeBox").html(adobe.length?`
  <div class="card">
    <div class="card-header bg-primary text-white" style="display:flex;justify-content:space-between;align-items:center">
      <span>🔵 Shutterstock / Adobe (${adobe.length})</span>
      <div>
        <button class="preview-btn" data-category="Shutterstock" data-items='${JSON.stringify(adobe).replace(/'/g, "&apos;")}' title="View items">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
          </svg>
        </button>
        <button class="btn btn-light btn-sm copy-btn" onclick='copyText(${JSON.stringify(adobe)})'>Copy</button>
      </div>
    </div>
    <div class="card-body">${adobe.map(x=>`<div>${x}</div>`).join("")}</div>
  </div>`:"");

  // Other section
  $("#otherBox").html(other.length?`
  <div class="card">
    <div class="card-header bg-secondary text-white" style="display:flex;justify-content:space-between;align-items:center">
      <span>⚪ Other (${other.length})</span>
      <div>
        <button class="preview-btn" data-category="Other" data-items='${JSON.stringify(other).replace(/'/g, "&apos;")}' title="View items">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
          </svg>
        </button>
        <button class="btn btn-light btn-sm copy-btn" onclick='copyText(${JSON.stringify(other)})'>Copy</button>
      </div>
    </div>
    <div class="card-body">${other.map(x=>`<div>${x}</div>`).join("")}</div>
  </div>`:"");
}

// Event delegation for preview button clicks
$(document).on("click", ".preview-btn", function(){
  const category = $(this).data("category");
  const items = $(this).data("items");
  openModal(category, items);
});

// Close modal when clicking outside
$(document).click(function(e){
  if(e.target.id==="modalOverlay"){
    closeModal();
  }
});

// Close modal with Escape key
$(document).keydown(function(e){
  if(e.key==="Escape"){
    closeModal();
  }
});

window.renderOrganizer=renderOrganizer;
renderOrganizer();

</script>

</body>
</html>
